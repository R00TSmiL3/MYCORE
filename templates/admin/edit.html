{% extends "admin/base.html" %}
{% block title %}{% if entry %}Edit Entri{% else %}Tambah Entri{% endif %}{% endblock %}
{% block content %}
<h1 class="page-title">{% if entry %}✏️ Edit Entri #{{ entry.id }}{% else %}➕ Tambah Entri Baru{% endif %}</h1>
<div class="card" style="max-width:700px;">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="type_id">Tipe</label>
            <select id="type_id" name="type_id" class="form-control" required>
                {% for t in types %}
                <option value="{{ t.id }}" {% if entry and entry.type_id == t.id %}selected{% endif %}>{{ t.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="content">Konten</label>
            <textarea id="content" name="content" class="form-control" required>{{ entry.content if entry else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="source">Sumber</label>
            <input type="text" id="source" name="source" class="form-control" value="{{ entry.source if entry else '' }}">
        </div>
        <div class="form-group">
            <label for="tags">Tag (pisahkan dengan koma)</label>
            <input type="text" id="tags" name="tags" class="form-control" value="{{ entry.tags if entry else '' }}">
        </div>
        <button type="submit" class="btn">Simpan</button>
        <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline" style="margin-left:0.5rem;">Batal</a>
    </form>
</div>
{% endblock %}
