{% extends "admin/base.html" %}
{% block title %}Kelola Tipe{% endblock %}
{% block content %}
<h1 class="page-title">🏷️ Tipe</h1>
<div class="card">
    <div class="btn-group" style="margin-bottom:1rem; flex-wrap:wrap;">
        <a href="?sort=a-z" class="btn btn-sm {% if current_sort == 'a-z' %}active{% endif %}">A–Z</a>
        <a href="?sort=z-a" class="btn btn-sm {% if current_sort == 'z-a' %}active{% endif %}">Z–A</a>
        <a href="?sort=newest" class="btn btn-sm {% if current_sort == 'newest' %}active{% endif %}">Terbaru</a>
        <a href="?sort=oldest" class="btn btn-sm {% if current_sort == 'oldest' %}active{% endif %}">Terlama</a>
        <a href="?sort=most" class="btn btn-sm {% if current_sort == 'most' %}active{% endif %}">Terbanyak</a>
        <a href="?sort=least" class="btn btn-sm {% if current_sort == 'least' %}active{% endif %}">Tersedikit</a>
    </div>
    <form method="POST" action="{{ url_for('admin.add_type') }}" class="btn-group" style="margin-bottom:1rem;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="name" placeholder="Nama tipe baru" class="form-control" required>
        <button type="submit" class="btn btn-sm">Tambah</button>
    </form>
    <table>
        <thead><tr><th>ID</th><th>Nama</th><th>Jumlah</th><th>Aksi</th></tr></thead>
        <tbody>
            {% for t in types %}
            <tr>
                <td>{{ t.id }}</td>
                <td>{{ t.name }}</td>
                <td>{{ t.cnt }}</td>
                <td>
                    <form method="POST" action="{{ url_for('admin.edit_type', id=t.id) }}" style="display:inline;">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="text" name="name" value="{{ t.name }}" class="form-control" style="width:auto; display:inline;">
                        <button type="submit" class="btn btn-sm btn-outline">Ubah</button>
                    </form>
                    <form method="POST" action="{{ url_for('admin.delete_type', id=t.id) }}" style="display:inline;" onsubmit="return confirm('Hapus tipe?')">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-sm btn-danger">Hapus</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
