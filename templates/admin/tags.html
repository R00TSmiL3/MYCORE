{% extends "admin/base.html" %}
{% block title %}Daftar Tag{% endblock %}
{% block content %}
<h1>Daftar Tag</h1>
<div class="sort-links">
    Urutkan:
    <a href="?sort=a-z" class="{% if current_sort == 'a-z' %}active{% endif %}">A-Z</a>
    <a href="?sort=z-a" class="{% if current_sort == 'z-a' %}active{% endif %}">Z-A</a>
    <a href="?sort=most" class="{% if current_sort == 'most' %}active{% endif %}">Terbanyak</a>
    <a href="?sort=least" class="{% if current_sort == 'least' %}active{% endif %}">Tersedikit</a>
</div>
<table>
    <thead><tr><th>Tag</th><th>Jumlah</th></tr></thead>
    <tbody>
        {% for tag in tags %}
        <tr><td>#{{ tag.tag }}</td><td>{{ tag.count }}</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
