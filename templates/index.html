<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕯️ Arsip Rasa</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🕯️ Arsip Rasa</h1>
            <p class="subtitle">Koleksi puisi, petikan, dan renungan psikologi</p>
        </header>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Cari kata..." autocomplete="off">
            <select id="typeSelect"><option value="">Semua Tipe</option></select>
            <input type="text" id="sourceInput" placeholder="Sumber (misal: Rumi)">
            <input type="text" id="tagInput" placeholder="Tag (misal: rindu)">
            <select id="sortSelect">
                <option value="newest">Terbaru</option>
                <option value="oldest">Terlama</option>
                <option value="a-z">A-Z</option>
                <option value="z-a">Z-A</option>
            </select>
        </div>
        <div id="statsContainer" class="stats"></div>
        <div id="cardGrid" class="grid"></div>
        <div id="loader" class="loader">Memuat...</div>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
