<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>🕯️ Arsip Rasa</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="light-mode">
    <header class="sticky-header">
        <div class="header-inner">
            <!-- Lilin Toggle Dark/Light -->
            <label class="candle-wrapper" id="candleWrapper">
                <input type="checkbox" id="themeToggle" checked>
                <div class="wrapper" id="lilinWrapper">
                    <div class="candles">
                        <div class="light__wave"></div>
                        <div class="candle1">
                            <div class="candle1__body">
                                <div class="candle1__eyes">
                                    <span class="candle1__eyes-one"></span>
                                    <span class="candle1__eyes-two"></span>
                                </div>
                                <div class="candle1__mouth"></div>
                            </div>
                            <div class="candle1__stick"></div>
                        </div>
                        <div class="candle2">
                            <div class="candle2__body">
                                <div class="candle2__eyes">
                                    <div class="candle2__eyes-one"></div>
                                    <div class="candle2__eyes-two"></div>
                                </div>
                            </div>
                            <div class="candle2__stick"></div>
                        </div>
                        <div class="candle2__fire"></div>
                        <div class="candle__smoke-one"></div>
                        <div class="candle__smoke-two"></div>
                    </div>
                    <div class="floor"></div>
                </div>
            </label>

            <div class="logo-area">
                <h1>🕯️ Arsip Rasa</h1>
                <p class="subtitle">Koleksi puisi, petikan, dan renungan</p>
            </div>

            <div class="search-area">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="searchInput" placeholder="Cari kata, sumber, tag..." autocomplete="off" aria-label="Cari konten">
                </div>
                <select id="sortSelect" class="sort-select" aria-label="Urutkan"></select>
                <button id="filterToggle" class="btn-filter" aria-expanded="false">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                    Filter
                </button>
                <button id="randomBtn" class="btn-random" title="Kutipan acak">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"/>
                        <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
                        <circle cx="15.5" cy="15.5" r="1.5" fill="currentColor"/>
                    </svg>
                    Acak
                </button>
                <button id="bookmarkBtn" class="btn-bookmarks" title="Bookmark">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span id="bookmarkBadge" class="badge" style="display:none;">0</span>
                </button>
            </div>
        </div>
        <div id="filterPanel" class="filter-panel" aria-hidden="true">
            <div class="filter-group"><label for="typeSelect">Tipe</label><select id="typeSelect"><option value="">Semua Tipe</option></select></div>
            <div class="filter-group"><label for="sourceInput">Sumber</label><input type="text" id="sourceInput" placeholder="Nama penulis/sumber..."></div>
            <div class="filter-group"><label for="tagInput">Tag</label><input type="text" id="tagInput" placeholder="Misal: rindu, trauma..."></div>
        </div>
        <div id="activeFilters" class="active-filters"></div>
    </header>

    <main class="container">
        <div id="statsContainer" class="stats-bar"></div>
        <div id="cardGrid" class="grid"></div>
        <div id="emptyState" class="empty-state" style="display:none;">
            <div class="empty-icon">📭</div>
            <h3>Tidak ada hasil</h3>
            <p>Coba kata kunci lain atau hapus filter.</p>
            <button id="clearFiltersBtn" class="btn-random">Hapus Semua Filter</button>
        </div>
        <div id="loader" class="loader" style="display:none;">
            <div class="loader-spinner"></div>
            <span>Memuat...</span>
        </div>
    </main>

    <script src="/static/js/script.js"></script>
</body>
</html>
