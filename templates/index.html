<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕯️ Arsip Rasa</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="sticky-header">
        <div class="header-inner">
            <div class="logo-area">
                <h1>🕯️ Arsip Rasa</h1>
                <p class="subtitle">Koleksi puisi, petikan, dan renungan</p>
            </div>
            <div class="search-area">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" stroke="#9a8c7a" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="searchInput" placeholder="Cari kata, sumber, tag..." autocomplete="off" aria-label="Cari konten">
                </div>
                <select id="sortSelect" class="sort-select" aria-label="Urutkan">
                    <!-- akan diisi oleh JS -->
                </select>
                <button id="filterToggle" class="btn-filter" aria-expanded="false" aria-label="Buka filter lanjutan">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                    Filter
                </button>
            </div>
        </div>
        <div id="filterPanel" class="filter-panel" aria-hidden="true">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="typeSelect">Tipe</label>
                    <select id="typeSelect"><option value="">Semua Tipe</option></select>
                </div>
                <div class="filter-group">
                    <label for="sourceInput">Sumber</label>
                    <input type="text" id="sourceInput" placeholder="Nama penulis/sumber...">
                </div>
                <div class="filter-group">
                    <label for="tagInput">Tag</label>
                    <input type="text" id="tagInput" placeholder="Misal: rindu, trauma...">
                </div>
            </div>
        </div>
        <div id="activeFilters" class="active-filters"></div>
    </header>

    <main class="container">
        <div id="statsContainer" class="stats-bar"></div>
        <div id="cardGrid" class="grid"></div>
        <div id="emptyState" class="empty-state" style="display:none;">
            <div class="empty-icon">📭</div>
            <h3>Tidak ada hasil</h3>
            <p>Coba kata kunci lain atau hapus filter.</p>
            <button id="clearFiltersBtn" class="btn btn-secondary">Hapus Semua Filter</button>
        </div>
        <div id="loader" class="loader" style="display:none;">
            <div class="loader-spinner"></div>
            <span>Memuat...</span>
        </div>
    </main>

    <script src="/static/js/script.js"></script>
</body>
</html>
